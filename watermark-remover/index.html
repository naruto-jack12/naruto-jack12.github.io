<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片去水印工具</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='8' y1='28' x2='24' y2='4'%3E%3Cstop stop-color='%234a9eff'/%3E%3Cstop offset='1' stop-color='%236ab0ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M16 4C11 12 8 16 8 20a8 8 0 0 0 16 0c0-4-3-8-8-16z' fill='url(%23g)'/%3E%3Cpath d='M20 14l-8 8M17 16l-5 5' stroke='%23fff' stroke-width='2' stroke-linecap='round' opacity='.7'/%3E%3Ccircle cx='23' cy='10' r='2' fill='%234a9eff'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <h1 class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" width="26" height="26" fill="none">
          <path d="M16 4C11 12 8 16 8 20a8 8 0 0 0 16 0c0-4-3-8-8-16z" fill="url(#lg)" opacity="0.3"/>
          <path d="M16 4C11 12 8 16 8 20a8 8 0 0 0 16 0c0-4-3-8-8-16z" stroke="url(#lg)" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M20 16l-8 8M16 18l-4 4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
          <circle cx="22" cy="10" r="1.5" fill="#4a9eff"/>
          <circle cx="26" cy="14" r="1" fill="#4a9eff"/>
          <circle cx="24" cy="8" r="0.8" fill="#6ab0ff"/>
          <defs>
            <linearGradient id="lg" x1="8" y1="28" x2="24" y2="4">
              <stop stop-color="#4a9eff"/>
              <stop offset="1" stop-color="#6ab0ff"/>
            </linearGradient>
          </defs>
        </svg>
        <span>去水印</span>工具
      </h1>
      <div class="header-actions">
        <button class="btn btn-sm" id="btnOpen" title="打开新图片替换当前图片">选择图片</button>
        <button class="btn btn-sm" id="btnToggleOrig" title="按住查看原图对比">对比</button>
        <button class="btn btn-sm btn-primary" id="btnDownload">下载</button>
        <button class="btn btn-icon" id="btnTheme" title="切换主题">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.5 5.5 0 0 1-4.4 2.26 5.5 5.5 0 0 1-5.5-5.5c0-1.86.92-3.5 2.33-4.5A9 9 0 0 0 12 3z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="main-content">
      <nav class="toolbar" id="toolbar">
        <button class="tool-btn active" id="toolRect" title="矩形选择 (R)">
          <svg viewBox="0 0 24 24" width="20" height="20"><rect x="4" y="4" width="16" height="16" rx="1" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span class="tool-btn-label">矩形</span>
        </button>
        <button class="tool-btn" id="toolBrush" title="画笔选择 (B)">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M13 3l8 8-9 9-8-8 9-9z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M4 20l4-4" stroke="currentColor" stroke-width="2"/></svg>
          <span class="tool-btn-label">画笔</span>
        </button>
        <button class="tool-btn" id="toolWand" title="魔术棒 (W)">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M9 3l1 2 2 1-2 1-1 2-1-2-2-1 2-1 1-2z" fill="currentColor"/><path d="M17 7l1 2 2 1-2 1-1 2-1-2-2-1 2-1 1-2z" fill="currentColor"/><line x1="12" y1="12" x2="5" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span class="tool-btn-label">魔棒</span>
        </button>
        <div class="tool-divider"></div>
        <button class="tool-btn" id="toolClone" title="仿制图章 (C)">
          <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span class="tool-btn-label">仿制</span>
        </button>
      </nav>

      <section class="editor-area" id="editorArea">
        <div class="empty-state" id="emptyState">
          <div class="upload-box" id="uploadBox">
            <div class="upload-icon">
              <svg viewBox="0 0 48 48" width="48" height="48">
                <rect x="8" y="12" width="32" height="24" rx="3" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
                <circle cx="20" cy="22" r="3" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
                <path d="M16 30l6-6 4 4 6-6 4 4v4H16z" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"/>
                <line x1="24" y1="36" x2="24" y2="44" stroke="currentColor" stroke-width="2" opacity="0.5"/>
                <line x1="18" y1="44" x2="30" y2="44" stroke="currentColor" stroke-width="2" opacity="0.5"/>
              </svg>
            </div>
            <div class="upload-text">点击上传或拖入图片</div>
            <div class="upload-hint">支持 JPG / PNG / WebP</div>
          </div>
          <div class="hotkey-hints">
            <span><kbd>R</kbd> 矩形</span>
            <span><kbd>B</kbd> 画笔</span>
            <span><kbd>W</kbd> 魔棒</span>
            <span><kbd>C</kbd> 仿制</span>
            <span><kbd>Ctrl+Z</kbd> 撤销</span>
            <span><kbd>Enter</kbd> 应用</span>
          </div>
        </div>
        <div class="editor-container" id="editorContainer">
          <canvas id="mainCanvas"></canvas>
          <canvas id="overlayCanvas"></canvas>
          <div class="processing-overlay" id="processingOverlay">
            <div class="spinner"></div>
            <span class="processing-text">正在处理...</span>
          </div>
        </div>
      </section>

      <aside class="panel" id="panel">
        <div class="panel-header" id="panelHeader">
          <h3>操作面板</h3>
          <button class="btn-icon" id="btnTogglePanel" title="收起/展开">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 10l4-4 4 4"/></svg>
          </button>
        </div>
        <div class="panel-scroll">
          <div class="panel-notice">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" style="flex-shrink:0">
              <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.2"/>
              <path d="M8 4.5v4M8 10.5v.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <span>只能做单一颜色背景图片处理，复杂背景图片可能会有问题</span>
          </div>
          <div class="panel-section">
            <div class="panel-section-title">选择工具</div>
            <div class="panel-row">
              <button class="btn btn-sm btn-primary" id="btnClearSel" disabled>清除选区</button>
            </div>
            <div class="slider-group" style="margin-top:8px">
              <label>画笔大小 <span id="brushSizeLabel">20</span></label>
              <input type="range" id="brushSize" min="5" max="100" value="20" step="1"
                     oninput="document.getElementById('brushSizeLabel').textContent=this.value">
            </div>
            <div class="slider-group" style="margin-top:8px;display:none" id="cloneSizeGroup">
              <label>仿制大小 <span id="cloneSizeLabel">30</span></label>
              <input type="range" id="cloneSize" min="10" max="150" value="30" step="1"
                     oninput="document.getElementById('cloneSizeLabel').textContent=this.value">
            </div>
          </div>

          <div class="panel-section">
            <div class="panel-section-title">去除方式</div>
            <div class="panel-row">
              <button class="btn btn-sm btn-primary" id="btnApplyInpaint" disabled>智能填充</button>
              <button class="btn btn-sm" id="btnApplyPatch" disabled>纹理填充</button>
            </div>
            <div class="panel-row">
              <button class="btn btn-sm" id="btnApplyFast" disabled>快速修复</button>
              <button class="btn btn-sm" id="btnApplyBlur" disabled>模糊</button>
            </div>
            <div class="slider-group" style="margin-top:8px">
              <label>修复半径 <span id="radiusLabel">5</span></label>
              <input type="range" id="inpaintRadius" min="2" max="15" value="5" step="1"
                     oninput="document.getElementById('radiusLabel').textContent=this.value">
            </div>
          </div>

          <div class="panel-section">
            <div class="panel-section-title">AI 修复</div>
            <div class="panel-row">
              <button class="btn btn-sm btn-primary" id="btnApplyAI" disabled>检测中...</button>
            </div>
            <div id="aiProgressWrap" style="display:none;margin-top:6px">
              <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden">
                <div id="aiProgress" style="height:100%;width:0%;background:var(--accent);transition:width .2s"></div>
              </div>
            </div>
            <div style="font-size:11px;color:var(--text-secondary);margin-top:4px" id="aiStatus">检测模型...</div>
          </div>

          <div class="panel-section">
            <div class="panel-section-title">操作历史</div>
            <div class="panel-row">
              <button class="btn btn-sm" id="btnUndo" disabled>撤销</button>
              <button class="btn btn-sm" id="btnRedo" disabled>重做</button>
            </div>
          </div>

          <div class="panel-section">
            <div class="panel-section-title">使用提示</div>
            <div style="font-size:12px;color:var(--text-secondary);line-height:1.7">
              <p>1. 选择水印区域</p>
              <p>2. 选择去除方式</p>
              <p>3. 点击应用处理</p>
              <p style="margin-top:6px;opacity:0.7">
                按住 <kbd style="background:var(--bg-card);border:1px solid var(--border);border-radius:2px;padding:0 4px">对比</kbd> 查看原图
              </p>
              <p style="opacity:0.7">
                仿制图章: <kbd style="background:var(--bg-card);border:1px solid var(--border);border-radius:2px;padding:0 4px">Ctrl+点击</kbd> 设源点
              </p>
            </div>
          </div>
        </div>
      </aside>
    </div>

    <footer class="status-bar">
      <span id="statusBar">就绪 - 上传图片开始去水印</span>
      <div class="zoom-controls">
        <button id="zoomOut">-</button>
        <span class="zoom-level" id="zoomLevel">100%</span>
        <button id="zoomIn">+</button>
      </div>
    </footer>
  </div>

  <input type="file" id="uploadInput" accept="image/*">
  <script defer src="js/inpaint.js"></script>
  <script defer src="js/ai.js"></script>
  <script defer src="js/editor.js"></script>
  <script defer src="js/app.js"></script>
  <script>
    // 按需加载 ONNX Runtime（仅当用户首次使用 AI 修复时）
    window._loadONNX = new Promise((resolve, reject) => {
      window._resolveONNX = resolve;
      window._rejectONNX = reject;
    });
    function loadONNXRuntime() {
      return window._loadONNX.then(exists => {
        if (exists) return;
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.webgpu.min.js';
          s.onload = () => { window._resolveONNX(true); resolve(); };
          s.onerror = () => { window._rejectONNX(new Error('ONNX Runtime 加载失败')); reject(new Error('加载失败')); };
          document.head.appendChild(s);
        });
      });
    }
  </script>
</body>
</html>
