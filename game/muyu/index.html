<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>电子木鱼</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <div class="score-block">
    <div class="score-label">功 德</div>
    <div class="score-num" id="count">0</div>
    <div class="stats">
      连击 <span id="combo">0</span>
      ｜ 总计 <span id="total">0</span>
      ｜ <span id="speed">0</span>/秒
    </div>
  </div>

  <div class="muyu-wrap" id="muyuWrap">
    <div class="muyu-main">
      <svg class="mallet" id="malletSvg" viewBox="0 0 46 92">
        <ellipse cx="23" cy="12" rx="5.5" ry="9.5" fill="var(--mallet)" stroke="rgba(0,0,0,0.2)" stroke-width="0.5"/>
        <rect x="20" y="22" width="6" height="60" rx="2" fill="var(--mallet)" opacity="0.7"/>
      </svg>

      <div class="hit-glow" id="hitGlow"></div>

      <!-- Side view: teardrop (pointed left, bulging right, slit on right) -->
      <svg class="muyu-body" id="muyuSvg" viewBox="0 0 380 210" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bodyGrad" cx="70%" cy="28%" r="65%">
            <stop offset="0%" stop-color="var(--fish-body-top)"/>
            <stop offset="50%" stop-color="var(--fish-body)"/>
            <stop offset="100%" stop-color="var(--fish-body-bottom)"/>
          </radialGradient>
          <filter id="shadow">
            <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
          </filter>
        </defs>

        <!-- Ground shadow -->
        <ellipse cx="200" cy="188" rx="140" ry="5" fill="rgba(0,0,0,0.05)"/>

        <!-- Main body: asymmetrical (narrow rounded left, wide bulging right) -->
        <path d="M 305 160
                 C 325 65, 245 50, 160 60
                 C 95 70, 62 125, 55 155
                 C 62 200, 95 218, 160 222
                 C 245 226, 325 218, 305 160 Z"
              fill="url(#bodyGrad)"
              filter="url(#shadow)"
              stroke="var(--fish-stroke)"
              stroke-width="1.2"
              opacity="0.95"/>

        <!-- Opening - horizontal crescent on the bulging right side -->
        <path d="M 218 148
                 Q 268 138 305 155
                 Q 268 166 218 158 Z"
              fill="var(--fish-mouth)"/>

        <!-- Opening depth -->
        <path d="M 223 150 Q 265 143 300 155 Q 265 161 223 156 Z"
              fill="#000" opacity="0.35"/>

        <!-- Opening rim -->
        <path d="M 218 148 Q 268 138 305 155"
              fill="none" stroke="var(--fish-highlight)" stroke-width="0.8" opacity="0.15"/>

        <!-- Highlight on the rounded right head -->
        <ellipse cx="230" cy="88" rx="38" ry="10"
                 fill="var(--fish-highlight)" transform="rotate(-8,230,88)"/>

        <!-- Striking area (top of the ridge) -->
        <ellipse cx="215" cy="92" rx="24" ry="6"
                 fill="none" stroke="var(--accent)" stroke-width="1" opacity="0.1"/>
      </svg>
    </div>
  </div>

  <div class="rank-badge" id="rankBadge">— 心诚则灵 —</div>

  <div class="bottom-bar">
    <button class="auto-btn" id="autoBtn">⏣ 自动</button>
    <button class="reset-btn" id="resetBtn">↺ 重置</button>
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>

  <div class="hint">点击木鱼 或 按空格键</div>
</div>

<script src="js/app.js"></script>
</body>
</html>
